<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The K-Spot | Broadcast Vibe</title>
    <style>
        /* --- DYNAMIC NEON SYSTEM --- */
        :root {
            --black: #000000;
            --neon-cyan: #00f2ff;
            --neon-blue: #0077ff;
            /* Added for the back button and borders */
            --neon-purple: #bc13fe;
            --neon-pink: #ff00de;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            min-height: 100vh;
            background-color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- BACKGROUND GRADIENT GLOW --- */
        .neon-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 85% 15%, rgba(0, 242, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 15% 85%, rgba(188, 19, 254, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- CONTACT CARD (Main Container) --- */
        .contact-card {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 60px 40px 50px 40px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            position: relative;
            overflow: hidden;
            animation: breathe 8s infinite alternate;
        }

        @keyframes breathe {
            0% {
                border-color: rgba(188, 19, 254, 0.2);
                box-shadow: 0 0 30px rgba(188, 19, 254, 0.1);
            }

            100% {
                border-color: rgba(0, 242, 255, 0.3);
                box-shadow: 0 0 60px rgba(0, 242, 255, 0.2);
            }
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* Back Button */
        .back-link {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            z-index: 10;
        }

        .back-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        h2 {
            color: var(--text);
            font-size: 2.2rem;
            margin-bottom: 30px;
            letter-spacing: -1px;
            text-align: center;
        }

        .highlight {
            color: var(--neon-purple);
            text-shadow: 0 0 15px var(--neon-purple);
        }

        /* --- FORM STYLING --- */
        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.85rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input,
        select,
        textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        textarea {
            resize: none;
            height: 120px;
        }

        /* --- PDF UPLOAD --- */
        .pdf-upload {
            border: 2px dashed var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .pdf-upload:hover {
            border-color: var(--neon-pink);
            background: rgba(255, 0, 222, 0.05);
        }

        .pdf-icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
            display: block;
        }

        /* --- SUBMIT BUTTON --- */
        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
            letter-spacing: 2px;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .grid-row {
                grid-template-columns: 1fr;
            }

            .contact-card {
                padding: 50px 20px 30px 20px;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>

<body>

    <div class="neon-bg"></div>

    <div class="contact-card">
        <a href="index.html" class="back-link"><span>←</span> BACK</a>

        <h2>Drop a <span class="highlight">Vibe</span></h2>

        <form id="vibeForm">
            <div class="grid-row">
                <div class="form-group">
                    <label>Section</label>
                    <input type="text" id="section" placeholder="e.g. Robotics Lab" required>
                </div>
                <div class="form-group">
                    <label>User Type</label>
                    <select id="userType">
                        <option>Student</option>
                        <option>Staff</option>
                        <option>External</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Date Deadline</label>
                <input type="date" id="deadline" required>
            </div>

            <div class="form-group">
                <label>Info / Message</label>
                <textarea id="message" placeholder="Write your campus update here..." required></textarea>
            </div>

            <div class="pdf-upload" id="uploadBox">
                <span class="pdf-icon">📄</span>
                <p style="color: #888; font-size: 0.9rem;">Tap to share <span style="color: var(--neon-pink);">PDF
                        Documents</span></p>
                <input type="file" accept=".pdf" style="display: none;" id="pdfFile">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Broadcast to Loop</button>
        </form>
    </div>

    <script>
        // REPLACE WITH YOUR APPS SCRIPT URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHeUVVWTsjeLD11LW7dc0xQkF2IZ0mjG3Nk8hPbRCxij7rccxGCPGQ9dO-pExiyAGk/exec';

        const form = document.getElementById('vibeForm');
        const btn = document.getElementById('submitBtn');
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('pdfFile');

        // Logic to make the whole dashed box clickable
        uploadBox.addEventListener('click', () => {
            fileInput.click();
        });

        // Visual feedback when file is selected
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                uploadBox.style.borderColor = 'var(--neon-cyan)';
                uploadBox.querySelector('p').innerHTML = `<span style="color: var(--neon-cyan);">File Ready:</span> ${fileInput.files[0].name}`;
            }
        });

        form.addEventListener('submit', e => {
            e.preventDefault();

            // Show loading state
            btn.disabled = true;
            btn.innerText = "Broadcasting...";

            const formData = {
                section: document.getElementById('section').value,
                userType: document.getElementById('userType').value,
                deadline: document.getElementById('deadline').value,
                message: document.getElementById('message').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
                .then(response => {
                    alert("✨ Vibe Broadcasted Successfully!");
                    form.reset();
                    uploadBox.style.borderColor = 'var(--glass-border)';
                    uploadBox.querySelector('p').innerHTML = 'Tap to share <span style="color: var(--neon-pink);">PDF Documents</span>';
                    btn.disabled = false;
                    btn.innerText = "Broadcast to Loop";
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Failed to broadcast. Check connection.");
                    btn.disabled = false;
                    btn.innerText = "Broadcast to Loop";
                });
        });
    </script>
</body>

</html>
