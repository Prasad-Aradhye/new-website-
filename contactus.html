<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The K-Spot | The Signal</title>
    <style>
        /* --- EXPLICITLY DARK SYSTEM --- */
        :root {
            --bg-black: #000000;
            --neon-purple: #bc13fe;
            --neon-blue: #00f2ff;
            --neon-pink: #ff00de;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(188, 19, 254, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
        }

        /* --- CONTACT CARD --- */
        .contact-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 60px 40px 50px 40px;
            /* Extra top padding for back button */
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            position: relative;
            overflow: hidden;
        }

        /* Back Button Style */
        .back-link {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #ffffff;
            /* Explicitly White */
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            z-index: 10;
        }

        .back-link:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 15px var(--neon-purple);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -1.5px;
            text-align: center;
        }

        .highlight {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus,
        textarea:focus {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.03);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .send-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            letter-spacing: 3px;
        }

        .social-footer {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .social-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .social-link:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
        }

        @media (max-width: 480px) {
            .contact-card {
                padding: 60px 20px 40px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="contact-card">
        <a href="index.html" class="back-link">
            <span>←</span> BACK
        </a>

        <h1>Send a <span class="highlight">Signal</span></h1>
        <p class="subtitle">Direct frequency to the KKW Hub leads.</p>

        <form id="contactForm">
            <div class="form-group">
                <label>Identify</label>
                <input type="text" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label>Frequency (Email)</label>
                <input type="email" placeholder="rollnumber@kkwagh.edu.in" required>
            </div>

            <div class="form-group">
                <label>The Message</label>
                <textarea placeholder="Type your transmission..."></textarea>
            </div>

            <button type="submit" class="send-btn">Push Message</button>
        </form>

        <div class="social-footer">
            <a href="#" class="social-link">INSTAGRAM</a>
            <a href="#" class="social-link">LINKEDIN</a>
            <a href="#" class="social-link">KKW PORTAL</a>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.querySelector('.send-btn');
            btn.innerHTML = "TRANSMITTING...";
            btn.style.background = "var(--neon-pink)";

            setTimeout(() => {
                btn.innerHTML = "SIGNAL RECEIVED";
                btn.style.boxShadow = "0 0 40px var(--neon-pink)";
                setTimeout(() => {
                    this.reset();
                    btn.innerHTML = "PUSH MESSAGE";
                    btn.style.background = "linear-gradient(45deg, var(--neon-purple), var(--neon-blue))";
                    btn.style.boxShadow = "0 10px 30px rgba(0,0,0,0.5)";
                }, 2000);
            }, 1500);
        });
    </script>

</body>

</html>
