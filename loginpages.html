<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The K-Spot | Global Entry</title>
    <style>
        /* --- DYNAMIC NEON SYSTEM --- */
        :root {
            --black: #000000;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00de;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            height: 100%;
            background-color: var(--black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Keeps the focus on the login experience */
        }

        /* --- FULL PAGE BACKGROUND ANIMATION --- */
        .neon-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 15% 15%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- RESPONSIVE FULL-PAGE CARD --- */
        .login-wrapper {
            width: 90%;
            max-width: 500px;
            padding: 60px 40px;
            background: var(--glass);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            position: relative;
            animation: breathe 8s infinite alternate;
        }

        /* --- NEON BREATHE ANIMATION --- */
        @keyframes breathe {
            0% {
                box-shadow: 0 0 20px rgba(188, 19, 254, 0.1);
                border-color: rgba(188, 19, 254, 0.2);
            }

            100% {
                box-shadow: 0 0 60px rgba(0, 242, 255, 0.3);
                border-color: rgba(0, 242, 255, 0.4);
            }
        }

        h1 {
            color: var(--text);
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1.5px;
        }

        .highlight {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        p.tagline {
            color: #888;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        /* --- FORM STYLING --- */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 18px 20px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.4s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .login-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
            letter-spacing: 2px;
        }

        /* --- CONTACT FOOTER --- */
        .contact-box {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-link {
            color: var(--neon-pink);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .contact-link:hover {
            text-shadow: 0 0 10px var(--neon-pink);
            color: white;
        }

        .phone-text {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #555;
        }



        .contact-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 60px 40px 50px 40px;
            /* Extra top padding for back button */
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            position: relative;
            overflow: hidden;
        }

        /* Back Button Style */
        .back-link {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #ffffff;
            /* Explicitly White */
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            z-index: 10;
        }

        .back-link:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 15px var(--neon-purple);
        }


        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 480px) {
            .login-wrapper {
                width: 100%;
                height: 100%;
                border-radius: 0;
                padding: 100px 30px;
                border: none;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="contact-card">
        <a href="index.html" class="back-link">
            <span>←</span> BACK
        </a>

        <div class="neon-bg"></div>

        <div class="login-wrapper">
            <h1>Welcome Back, <span class="highlight">Login to access</span></h1>
            <p class="tagline">Your campus connection is one step away.</p>

            <form>
                <div class="form-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">Initialize Access</button>
            </form>

            <div class="contact-box">
                <a href="https://instagram.com/thekspot_kkwagh" class="contact-link">@thekspot_kkwagh</a>
                <span class="phone-text">Support Line: +91 6743893223</span>
                <p style="font-size: 11px; margin-top: 15px; color: #444;">kkwagh.edu.in</p>
            </div>
        </div>

</body>

</html>
